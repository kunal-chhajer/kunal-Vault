<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'unsafe-inline';">
<title>Connecting...</title>
<style>
  body { background:#0a0b0d; color:#e8e4dc; font-family:sans-serif;
    display:flex; align-items:center; justify-content:center; height:100vh; margin:0; text-align:center; }
  p { font-size:15px; opacity:0.7; }
</style>
</head>
<body>
<div>
  <p>🔐 Connecting to OneDrive...<br><small>This window will close automatically.</small></p>
</div>
<script>
// This page is ONLY a messenger. It reads the auth code from the URL
// and sends it securely to the parent window, then closes itself.
// It never stores anything. It never contacts any server.
(function() {
  'use strict';
  const params = new URLSearchParams(window.location.search);
  const code   = params.get('code');
  const error  = params.get('error');
  const state  = params.get('state');

  if (!window.opener) {
    document.querySelector('p').textContent = 'Error: No parent window found. Please close this tab.';
    return;
  }

  // Only send to same origin — prevents cross-origin attacks
  try {
    window.opener.postMessage(
      { type: 'kv_oauth_callback', code, error, state },
      window.location.origin  // CRITICAL: only same origin receives this
    );
  } catch(e) {
    // Parent may have closed — safe to ignore
  }

  // Close this popup
  window.close();

  // Fallback if window.close() is blocked
  setTimeout(() => {
    document.querySelector('p').textContent = 'Done! You can close this tab.';
  }, 500);
})();
</script>
</body>
</html>
